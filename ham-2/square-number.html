<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tính Bình Phương</title>

    <link rel="stylesheet" href="background.css">
</head>
<body>

<main class="square-page">

    <section class="square-box">

        <h2 class="page-title">
            Tính Bình Phương
        </h2>

        <input
                type="number"
                id="numberInput"
                class="number-input"
                placeholder="Nhập số bất kỳ"
        >

        <button
                class="square-button"
                onclick="showSquareResult()"
        >
            Tính kết quả
        </button>

        <p
                id="resultText"
                class="result-text"
        ></p>

    </section>

</main>

<script src="calculate.js"></script>

</body>
</html>
