<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>diện tích hình tròn</title>
</head>
<body>

<p>Diện tích hình tròn</p><br>

<input type="number" id="radius" placeholder="Nhập bán kính"><br><br>

<button onclick="calculateArea()">tính</button>
<p id="result"></p>

<script>
    function calculateArea() {
        let r = parseFloat(document.getElementById("radius").value);
        let area = Math.PI * r * r;
        document.getElementById("result").innerHTML = area;
    }
</script>

</body>
</html>
