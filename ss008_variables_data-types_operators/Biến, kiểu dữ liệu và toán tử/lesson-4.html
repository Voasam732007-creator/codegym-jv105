<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chu vi hình tròn</title>
</head>
<body>

<h2>Tính chu vi hình tròn</h2>

<input type="number" id="radius" placeholder="Nhập bán kính"><br><br>
<button onclick="calculatePerimeter()">calculate</button>

<script>
    function calculatePerimeter() {
        let r = parseFloat(document.getElementById("radius").value);
        let chuVi = 2 * Math.PI * r;

        console.log(chuVi);
    }
</script>

</body>
</html>
