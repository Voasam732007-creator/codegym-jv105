<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<form>
    <div>
        <input id="user" placeholder="Username" type="text"/>
    </div>

    <div>
        <input id="pass" placeholder="Password" type="password"/>
        <button type="button" id="toggleBtn">show password</button>
    </div>
</form>

<script>
    const pass = document.querySelector('#pass');
    const btnEl = document.querySelector('#toggleBtn');

    btnEl.addEventListener('click', function () {
        console.log("password");

        if (pass.type === 'password') {
            pass.type = 'text';
            btnEl.innerHTML = "Hide pass";
        } else {
            pass.type = 'password';
            btnEl.innerHTML = "Show pass";
        }
    });
</script>

</body>
</html>
