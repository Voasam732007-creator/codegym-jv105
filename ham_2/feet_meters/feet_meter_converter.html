<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Chuyển đổi Feet và Meters</title>
  <link rel="stylesheet" href="background.css">
</head>
<body>

<div class="container">
  <h1>Chuyển đổi giữa Feet và Meters</h1>

  <div class="box">
    <h2>Feet sang Meters</h2>
    <input type="number" id="footInput" placeholder="Nhập feet">
    <button onclick="convertFootToMeter()">Chuyển đổi</button>
    <p id="meterResult"></p>
  </div>

  <div class="box">
    <h2>Meters sang Feet</h2>
    <input type="number" id="meterInput" placeholder="Nhập meters">
    <button onclick="convertMeterToFoot()">Chuyển đổi</button>
    <p id="footResult"></p>
  </div>
</div>

<script src="calculate.js"></script>
</body>
</html>
