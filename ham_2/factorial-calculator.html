<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tính Giai Thừa</title>

    <link rel="stylesheet" href="factorial-calculator.css">
</head>
<body>

<main class="factorial-page">

    <section class="factorial-box">

        <h2 class="page-title">
            Calculate the Yahyayana
        </h2>

        <input
                type="number"
                id="numberInput"
                class="number-input"
                placeholder="Nhập số nguyên"
        >

        <button
                class="calculate-button"
                onclick="showFactorialResult()"
        >
            Tính kết quả
        </button>

        <p
                id="resultText"
                class="result-text"
        ></p>

    </section>

</main>

<script src="factorial-calculator.js"></script>

</body>
</html>
