<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Kiểm Tra Số Nguyên Dương</title>

    <link rel="stylesheet" href="background.css">
</head>
<body>

<main class="check-page">

    <section class="check-box">

        <h2 class="page-title">
            Kiểm Tra Số Nguyên Dương
        </h2>

        <input
                type="number"
                id="numberInput"
                class="number-input"
                placeholder="Nhập một số"
        >

        <button
                class="check-button"
                onclick="showCheckResult()"
        >
            Kiểm tra
        </button>

        <p
                id="resultText"
                class="result-text"
        ></p>

    </section>

</main>

<script src="calculate.js"></script>

</body>
</html>
