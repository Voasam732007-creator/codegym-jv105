<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>khách hàng</title>
</head>

<body>
 <body style="background-color:rosybrown;"
<form>
    <fieldset>
        <legend>form đăng kí</legend>
      <fieldset style="background-color: wheat;">

        <label for="unname">Họ và tên:</label> <br>
        <input type="text" id="unname" name="unname"><br>

        <label for="email">Email:</label> <br>
        <input type="email" id="email" name="email"><br>

        <label for="phone">Số điện thoại:</label> <br>
        <input type="text" id="phone" name="phone"><br><br>

        Giới tính:<br>
        <input type="radio" id="male" name="gender" value="Nam" checked>
        <label for="male">Nam</label>

        <input type="radio" id="female" name="gender" value="Nữ">
        <label for="female">Nữ</label> <br> <br>

        <input type="submit" value="Đăng ký"
                style="background-color: chartreuse;">
      </fieldset>

    </fieldset>
</form>

</body>
</html>
