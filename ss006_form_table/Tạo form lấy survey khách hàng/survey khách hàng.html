<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Survey khách hàng</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Market Research Survey</h1>
    <p>Please take a few moments to complete this satisfaction survey.</p>

    <form>

        <div class="row">
            <label>What is your age range?</label>
            <select name="age">
                <option value="18-24">18-24</option>
                <option value="25-34">25-34</option>
                <option value="35-50">35-50</option>
            </select>
        </div>

        <div class="row"><br>
            <label>What is your yearly income range?</label>
            <select name="income">
                <option value="0-25000">$0 - $25,000</option>
                <option value="25000-50000">$25,000 - $50,000</option>
            </select>
        </div>

        <div class="row inline"><br>
            <label class="title">Gender:</label><br>
            <label><input type="radio" name="gender"> Male</label><br>
            <label><input type="radio" name="gender"> Female</label>
        </div>

        <div class="row"><br>
            <label class="title">
                Which of the following products have you purchased in the last 2 months?
            </label>
            <div class="inline">
                <label><input type="checkbox"> Product 1</label>
                <label><input type="checkbox"> Product 2</label>
                <label><input type="checkbox"> Product 3</label>
            </div>
        </div>

        <div class="row"><br>
            <label class="title">How often would you use our new product?</label>
            <div class="inline-col">
                <label><input type="radio" name="freq"> Daily</label>
                <label><input type="radio" name="freq"> Weekly</label>
                <label><input type="radio" name="freq"> Monthly</label>
            </div>
        </div>

        <div class="row"><br>
            <label class="title">What would you pay for the new product?</label>
            <div class="inline">
                <span>$</span>
                <input type="text" placeholder="Dollars">
                <span>.</span>
                <input type="text" placeholder="Cents">
            </div>
        </div>

        <div class="row"><br>
            <label>What features would you like to see in the new product?</label><br>
            <textarea rows="6" cols="100"></textarea>
        </div>

        <div class="row"><br>
            <label class="big-title">Rate your agreement</label>

            <table border="1">
                <tr>
                    <th></th>
                    <th>Strongly Disagree</th>
                    <th>Disagree</th>
                    <th>Agree</th>
                    <th>Strongly Agree</th>
                </tr>

                <tr>
                    <td>Our products are priced fairly</td>
                    <td><label class="radio-col"><input type="radio" name="price1"><span>1</span></label></td>
                    <td><label class="radio-col"><input type="radio" name="price1"><span>2</span></label></td>
                    <td><label class="radio-col"><input type="radio" name="price1"><span>3</span></label></td>
                    <td><label class="radio-col"><input type="radio" name="price1"><span>4</span></label></td>
                </tr>

                <tr>
                    <td>Our products are high quality</td>
                    <td><label class="radio-col"><input type="radio" name="price2"><span>1</span></label></td>
                    <td><label class="radio-col"><input type="radio" name="price2"><span>2</span></label></td>
                    <td><label class="radio-col"><input type="radio" name="price2"><span>3</span></label></td>
                    <td><label class="radio-col"><input type="radio" name="price2"><span>4</span></label></td>
                </tr>

                <tr>
                    <td>You would recommend our products</td>
                    <td><label class="radio-col"><input type="radio" name="price3"><span>1</span></label></td>
                    <td><label class="radio-col"><input type="radio" name="price3"><span>2</span></label></td>
                    <td><label class="radio-col"><input type="radio" name="price3"><span>3</span></label></td>
                    <td><label class="radio-col"><input type="radio" name="price3"><span>4</span></label></td>
                </tr>
            </table>
        </div>

        <button type="submit">Submit</button>

    </form>

</div>

</body>
</html>
