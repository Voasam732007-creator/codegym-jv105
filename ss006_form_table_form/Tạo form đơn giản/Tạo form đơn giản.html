<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Sở thích</title>
</head>

<body style="background-color:#b7d7d9; font-family:Arial;">

<div style="width:600px; margin:auto; background:#eee; padding:20px;">

    <!-- Tiêu đề -->
    <h2 style="background:#ff4d1a; color:white; text-align:center; padding:10px;">
        SỞ THÍCH CỦA BẠN
    <h2>

    <form>

        <!-- Họ tên -->
        <p>
            <span style="color:blue;">Họ và tên</span><br>
            <input type="text" name="yourname" style="width:100%; padding:5px;">
        </p>

        <!-- Email -->
        <p>
            <span style="color:blue;">Email</span><br>
            <input type="text" name="email" style="width:100%; padding:5px;">
        <p>

        <!-- Sở thích -->
        <p style="color:blue;">Sở thích</p>
        <div style="color:orange;">
            <input type="checkbox" name="hobby"> Thể thao
            <input type="checkbox" name="hobby"> Âm nhạc
            <input type="checkbox" name="hobby"> Đọc sách <br>

            <input type="checkbox" name="hobby"> Lướt web
            <input type="checkbox" name="hobby"> Chơi game
            <input type="checkbox" name="hobby"> Điện ảnh <br>

            <input type="checkbox" name="hobby"> Du lịch
        </div>

        <!-- Nút -->
        <p>
            <button type="submit" style="background:green; color:white; padding:8px;">
                Gửi thông tin
            </button>

            <button type="reset" style="background:gray; color:white; padding:8px;">
                Nhập lại
            </button>
        </p>

    </form>

</div>

</body>
</html>
